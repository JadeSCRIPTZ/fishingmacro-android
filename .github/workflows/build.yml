name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" FishingMacroPro.apk
          echo "APK: $APK"

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ steps.date.outputs.date }}
          name: "FishingMacro Pro APK — ${{ steps.date.outputs.date }}"
          body: |
            ## 🎣 FishingMacro Pro pentru Android

            ### ⬇️ Instalare
            1. Descarca **FishingMacroPro.apk**
            2. Pe Android: **Setari → Securitate → Surse necunoscute → Activ**
            3. Instaleaza si urmeaza pasii din aplicatie

            ### Cum gasesti coordonatele X/Y
            Activeaza **Optiuni dezvoltator → Locatie pointer** pe telefon
            si atinge bobber-ul — coordonatele apar in timp real.
          files: FishingMacroPro.apk
